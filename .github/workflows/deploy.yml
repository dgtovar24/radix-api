name: Deploy to Server

on:
  push:
    branches:
      - v2
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Build with Maven
        run: ./mvnw clean package -DskipTests -q

      - name: Stop old container
        run: |
          if docker ps -a --format '{{.Names}}' | grep -q '^radix-api$'; then
            docker kill radix-api 2>/dev/null || true
            docker rm radix-api 2>/dev/null || true
          fi

      - name: Build Docker image
        run: docker build -t radix-api:v2 .

      - name: Run container
        run: |
          docker run -d \
            --name radix-api \
            --restart unless-stopped \
            -p 8080:8080 \
            -e DB_HOST=${{ secrets.DB_HOST }} \
            -e DB_PORT=${{ secrets.DB_PORT }} \
            -e DB_NAME=${{ secrets.DB_NAME }} \
            -e DB_USER=${{ secrets.DB_USER }} \
            -e DB_PASSWORD=${{ secrets.DB_PASSWORD }} \
            radix-api:v2

      - name: Health check
        run: |
          for i in {1..30}; do
            if curl -sf http://localhost:8080/v2/ > /dev/null 2>&1; then
              echo "Application is healthy"
              exit 0
            fi
            echo "Waiting for application to start... ($i/30)"
            sleep 2
          done
          echo "Health check failed"
          docker logs radix-api
          exit 1