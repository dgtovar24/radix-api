name: Deploy to Server

on:
  push:
    branches:
      - v2
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
      - name: Determine version
        id: version
        run: |
          if [ "${{ github.ref_name }}" = "v2" ] || [ "${{ github.ref_name }}" = "main" ]; then
            echo "VERSION=v1" >> $GITHUB_OUTPUT
            echo "CONTEXT_PATH=/v1" >> $GITHUB_OUTPUT
            echo "CONTAINER_NAME=radix-api" >> $GITHUB_OUTPUT
            echo "PORT=8080" >> $GITHUB_OUTPUT
          fi

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Build with Maven
        run: ./mvnw clean package -DskipTests -q

      - name: Stop old container
        run: |
          if docker ps -a --format '{{.Names}}' | grep -q '^${{ steps.version.outputs.CONTAINER_NAME }}$'; then
            docker kill ${{ steps.version.outputs.CONTAINER_NAME }} 2>/dev/null || true
            docker rm ${{ steps.version.outputs.CONTAINER_NAME }} 2>/dev/null || true
          fi

      - name: Build Docker image
        run: docker build -t radix-api:${{ steps.version.outputs.VERSION }} .

      - name: Run container
        run: |
          docker run -d \
            --name ${{ steps.version.outputs.CONTAINER_NAME }} \
            --restart unless-stopped \
            --network host \
            -e SERVER_PORT=8080 \
            -e CONTEXT_PATH=${{ steps.version.outputs.CONTEXT_PATH }} \
            -e DB_HOST=132.145.194.97 \
            -e DB_PORT=${{ secrets.DB_PORT }} \
            -e DB_NAME=${{ secrets.DB_NAME }} \
            -e DB_USER=${{ secrets.DB_USER }} \
            -e DB_PASSWORD=${{ secrets.DB_PASSWORD }} \
            radix-api:${{ steps.version.outputs.VERSION }}

      - name: Health check
        id: health_check
        run: |
          HEALTH_URL="http://localhost:${{ steps.version.outputs.PORT }}${{ steps.version.outputs.CONTEXT_PATH }}/"
          echo "Checking health at $HEALTH_URL"
          for i in {1..45}; do
            if curl -sf "$HEALTH_URL" > /dev/null 2>&1; then
              echo "Application is healthy at $HEALTH_URL"
              exit 0
            fi
            echo "Waiting for application to start... ($i/45)"
            sleep 2
          done
          echo "Health check failed at $HEALTH_URL"
          echo "--- CONTAINER LOGS ---"
          docker logs ${{ steps.version.outputs.CONTAINER_NAME }}
          exit 1