spring.application.name=radix

# Default to H2 for local development, override with env vars for production
spring.datasource.url=${DATABASE_URL:jdbc:h2:mem:radixdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.driver-class-name=${DATABASE_DRIVER:org.h2.Driver}
spring.datasource.username=${DATABASE_USERNAME:sa}
spring.datasource.password=${DATABASE_PASSWORD:}

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.sql.init.mode=never

server.port=${SERVER_PORT:8080}
server.servlet.context-path=/v2

# File uploads
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
radix.uploads.path=${UPLOADS_PATH:/tmp/radix-uploads}

# FHIR Configuration
fhir.base-url=${FHIR_BASE_URL:http://localhost:8080/v2}